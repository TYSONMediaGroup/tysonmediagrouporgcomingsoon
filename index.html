<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tysonmediagroup.org | Coming Soon</title>
    <!-- Importing Cormorant Garamond -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a; /* Deep charcoal black */
            font-family: 'Cormorant Garamond', serif;
            color: #e0e0e0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Ambient 3D Cinematic Lighting --- */
        .ambient-light {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.35;
            z-index: 0;
            animation: floatLight 12s infinite alternate ease-in-out;
            pointer-events: none;
        }

        /* Warm cinematic spotlight (Tungsten feel) */
        .light-1 {
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, #3e2e1a, #0a0a0a);
            top: -10%;
            left: -10%;
        }

        /* Cool cinematic fill light (Steel blue feel) */
        .light-2 {
            width: 35vw;
            height: 35vw;
            background: radial-gradient(circle, #1a2430, #0a0a0a);
            bottom: -5%;
            right: -5%;
            animation-duration: 16s;
            animation-direction: alternate-reverse;
        }

        @keyframes floatLight {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5vw, 5vh) scale(1.1); }
        }

        /* --- 3D Scene Wrapper --- */
        .scene {
            perspective: 1400px;
            z-index: 1;
            width: 90%;
            max-width: 850px;
        }

        /* --- Floating Frosted Glass Card --- */
        .glass-card {
            width: 100%;
            padding: 80px 50px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px; /* Sharper corners for a classic look */
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
            
            transform-style: preserve-3d;
            transition: transform 0.15s ease-out; 
            
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Z-Axis Pop Elements */
        .logo-container {
            transform: translateZ(90px);
            margin-bottom: 25px;
            width: 100%;
            max-width: 550px;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.6));
        }

        h2 {
            font-size: clamp(1.2rem, 2vw, 1.8rem);
            font-weight: 300;
            letter-spacing: 6px;
            color: #a3a3a3;
            margin-bottom: 50px;
            text-transform: uppercase;
            transform: translateZ(60px);
        }

        /* Brand Branches */
        .branches {
            display: flex;
            gap: 25px;
            font-size: 1.2rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 2px;
            color: #888;
            transform: translateZ(70px);
            margin-bottom: 60px;
        }

        .branch {
            transition: color 0.4s ease;
            cursor: default;
        }

        .branch:hover {
            color: #ffffff;
        }

        .separator {
            color: #333;
            user-select: none;
            font-style: normal;
        }

        /* Elegant Button */
        .notify-btn {
            padding: 16px 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: transparent;
            color: #ffffff;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            transform: translateZ(80px);
        }

        .notify-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            color: #0a0a0a;
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.9);
            transform: translateZ(100px) scale(1.02);
        }

        @media (max-width: 600px) {
            .branches {
                flex-direction: column;
                gap: 15px;
            }
            .separator {
                display: none;
            }
            .glass-card {
                padding: 50px 25px;
            }
            .logo-container {
                transform: translateZ(50px);
            }
        }
    </style>
</head>
<body>

    <!-- Cinematic Lighting -->
    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <!-- 3D Scene -->
    <div class="scene">
        <div class="glass-card" id="tilt-card">
            
            <div class="logo-container">
                <img src="https://raw.githubusercontent.com/TYSONMediaGroup/TYSONMediaGroup/refs/heads/main/imagestuff/TYSONMediaGroupBanner.png" alt="TYSON Media Group Banner">
            </div>
            
            <h2>Coming Soon</h2>
            
            <div class="branches">
                <span class="branch">Media</span>
                <span class="separator">|</span>
                <span class="branch">Aviation</span>
                <span class="separator">|</span>
                <span class="branch">Atlantis</span>
            </div>

            <button class="notify-btn" onclick="notify()">Stay Updated</button>
            
        </div>
    </div>

    <script>
        // --- 3D Tilt Logic ---
        const card = document.getElementById('tilt-card');
        const scene = document.querySelector('.scene');

        // Max rotation in degrees (lowered slightly for a more subtle, premium feel)
        const maxTilt = 10;

        scene.addEventListener('mousemove', (e) => {
            const rect = scene.getBoundingClientRect();
            
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            
            const rotateX = -(y / (rect.height / 2)) * maxTilt;
            const rotateY = (x / (rect.width / 2)) * maxTilt;

            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // Snap back to original position
        scene.addEventListener('mouseleave', () => {
            card.style.transition = 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1)';
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
            
            setTimeout(() => {
                card.style.transition = 'transform 0.15s ease-out';
            }, 800);
        });

        // Clean, professional button interaction
        function notify() {
            const btn = document.querySelector('.notify-btn');
            const originalText = btn.innerText;
            
            if(originalText === "Stay Updated") {
                btn.innerText = "Added to List";
                btn.style.background = "rgba(255, 255, 255, 0.9)";
                btn.style.color = "#0a0a0a";
                btn.style.pointerEvents = "none";
                
                setTimeout(() => {
                    btn.innerText = "Stay Updated";
                    btn.style.background = "transparent";
                    btn.style.color = "#ffffff";
                    btn.style.pointerEvents = "auto";
                }, 4000);
            }
        }
    </script>
</body>
</html>
