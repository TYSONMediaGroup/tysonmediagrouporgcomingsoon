<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tysonmediagroup.org</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            background-color: #020202;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Cinematic Background Glow */
        .glow-field {
            position: absolute;
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 70%);
            opacity: 0;
            transition: opacity 3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 0;
        }

        .glow-field.active { opacity: 1; }

        .brand-container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 1000px;
        }

        .svg-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 100px;
            fill: rgba(255, 255, 255, 0.05); /* Starts very subtle */
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 0.5px;
            transition: all 4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* The "Powerful Glow" State */
        .svg-text.active {
            fill: rgba(255, 255, 255, 0.9);
            stroke: rgba(255, 255, 255, 0.9);
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)) 
                    drop-shadow(0 0 50px rgba(255,255,255,0.2));
            stroke-width: 0px;
        }

        @media (max-width: 800px) { .svg-text { font-size: 60px; } }
    </style>
</head>
<body>

    <div class="glow-field" id="glow"></div>

    <div class="brand-container">
        <svg viewBox="0 0 1000 200">
            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="svg-text" id="brand-text">tysonmediagroup.org</text>
        </svg>
    </div>

    <script>
        window.addEventListener('load', () => {
            const text = document.getElementById('brand-text');
            const glow = document.getElementById('glow');

            // Trigger the cinematic glow sequence
            setTimeout(() => {
                text.classList.add('active');
                glow.classList.add('active');
            }, 500); // Slight delay for dramatic effect
        });
    </script>
</body>
</html>
