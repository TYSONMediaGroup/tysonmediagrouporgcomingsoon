<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tysonmediagroup.org</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .brand-container {
            position: relative;
            z-index: 1;
            /* This makes the text feel 'solid' but 'lit' */
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: 8rem; /* Large scale for impact */
            letter-spacing: 2px;
            color: #ffffff;
            
            /* The Multi-Layer Bloom Effect */
            text-shadow: 
                0 0 5px rgba(255, 255, 255, 1),    /* Sharp core */
                0 0 15px rgba(255, 255, 255, 0.8),  /* Inner glow */
                0 0 30px rgba(255, 255, 255, 0.6),  /* Mid glow */
                0 0 60px rgba(255, 255, 255, 0.4),  /* Outer bloom */
                0 0 120px rgba(255, 255, 255, 0.2); /* Deep ambient light */
            
            opacity: 0;
            transform: scale(0.95);
            transition: all 4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand-container.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Subtle background pulse to make the scene feel 'alive' */
        .ambient-bloom {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 4s ease;
        }

        .ambient-bloom.active { opacity: 1; }

        @media (max-width: 900px) { .brand-container { font-size: 4rem; } }
    </style>
</head>
<body>

    <div class="ambient-bloom" id="ambient"></div>
    
    <div class="brand-container" id="brand">
        tysonmediagroup.org
    </div>

    <script>
        window.addEventListener('load', () => {
            // Trigger the transition after a brief pause for a 'fade-in' feel
            setTimeout(() => {
                document.getElementById('brand').classList.add('active');
                document.getElementById('ambient').classList.add('active');
            }, 300);
        });
    </script>
</body>
</html>
