<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYSON Media Group | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #020202; /* Pitch black for the draw-in phase */
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The background that fades in after the flash */
        .cinematic-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #1a202c 0%, #050505 80%);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
            transition: opacity 1.5s ease-out;
        }

        .cinematic-bg.ignite {
            opacity: 1;
        }

        /* Container for the logo */
        .brand-container {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 90%;
            max-width: 1200px; /* Widened to accommodate the URL */
        }

        /* SVG used to draw the text outline */
        .svg-logo {
            width: 100%;
            height: auto;
            max-height: 250px;
            overflow: visible;
        }

        .svg-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic; /* Forces the premium italic lean */
            font-size: 100px;
            font-weight: 300;
            letter-spacing: 4px; /* Tighter tracking for a URL */
            fill: transparent;
            stroke: rgba(255, 255, 255, 0.4);
            stroke-width: 1px;
            /* Higher values required to wrap the longer string of text */
            stroke-dasharray: 2500;
            stroke-dashoffset: 2500;
        }

        /* --- Animations --- */

        /* 1. Tracing the outline */
        @keyframes drawOutline {
            to { stroke-dashoffset: 0; }
        }

        .draw-active {
            animation: drawOutline 3.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        /* 2. The bulb flicker and final glow */
        @keyframes bulbIgnition {
            0%   { fill: transparent; filter: drop-shadow(0 0 0px #fff); stroke: rgba(255, 255, 255, 0.4); stroke-width: 1px; }
            50%  { fill: #fff; filter: drop-shadow(0 0 30px #fff) drop-shadow(0 0 60px rgba(255,255,255,0.5)); stroke-width: 0; }
            60%  { fill: transparent; filter: drop-shadow(0 0 0px #fff); }
            70%  { fill: #fff; filter: drop-shadow(0 0 40px #fff); }
            80%  { fill: transparent; filter: drop-shadow(0 0 0px #fff); }
            100% { fill: #fff; filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 30px rgba(255,255,255,0.2)); stroke-width: 0; }
        }

        .ignite-active {
            animation: bulbIgnition 1s ease-in-out forwards;
        }

        /* Mobile adjustments for the long URL */
        @media (max-width: 800px) {
            .svg-text {
                font-size: 70px;
            }
        }
        
        @media (max-width: 500px) {
            .svg-text {
                font-size: 45px;
            }
        }
    </style>
</head>
<body>

    <div class="cinematic-bg" id="background"></div>

    <div class="brand-container">
        <svg class="svg-logo" viewBox="0 0 1000 200">
            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="svg-text" id="tyson-text">tysonmediagroup.org</text>
        </svg>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tysonText = document.getElementById('tyson-text');
            const bg = document.getElementById('background');

            // Step 1: Start the drawing sequence
            tysonText.classList.add('draw-active');

            // Step 2: Trigger the flash and background reveal after drawing is almost complete
            setTimeout(() => {
                tysonText.classList.add('ignite-active');
                bg.classList.add('ignite');
            }, 3000); 
        });
    </script>

</body>
</html>
