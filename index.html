<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | tysonmediagroup.org</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #000; 
            color: #fff;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Cormorant Garamond', serif;
        }

        /* 
          This wrapper controls the final massive zoom.
          The transform-origin is targeted precisely at the 'o' in "group".
          If it's slightly off center on your specific screen, adjust the 67.5%.
        */
        .zoom-wrapper {
            position: relative;
            width: 90vw;
            max-width: 1200px;
            display: flex;
            justify-content: center;
            transform-origin: 67.5% 53%; 
            will-change: transform, opacity;
            transition: transform 2.5s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.5s 2s;
            z-index: 2;
        }

        /* The scale(150) punches the viewport directly through the hole of the 'o' */
        .zoomed {
            transform: scale(150);
            opacity: 0;
        }

        .svg-canvas {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        /* 
          PHASE 1: THE TRACE
          Draws the outline strictly from left to right.
        */
        .text-outline {
            font-size: 100px;
            font-style: italic;
            fill: transparent;
            stroke: rgba(255, 255, 255, 0.6);
            stroke-width: 0.5px;
            stroke-dasharray: 2500;
            stroke-dashoffset: 2500;
            animation: traceLeftToRight 4.5s linear forwards;
        }

        @keyframes traceLeftToRight {
            to { stroke-dashoffset: 0; }
        }

        /* 
          PHASE 2: THE GLOW
          Starts transparent, then blasts white with heavy outer and inner dropshadows.
        */
        .text-fill {
            font-size: 100px;
            font-style: italic;
            fill: #ffffff;
            opacity: 0;
            /* Using drop-shadows to create that shiny, reflective projection */
            filter: drop-shadow(0 0 40px rgba(255,255,255,0.8)) 
                    drop-shadow(0 0 80px rgba(255,255,255,0.6));
        }

        .glow-active {
            animation: explosiveGlow 2s ease-out forwards;
        }

        @keyframes explosiveGlow {
            0% { opacity: 0; filter: drop-shadow(0 0 0px #fff); }
            20% { opacity: 1; filter: drop-shadow(0 0 50px #fff) drop-shadow(0 0 100px #fff); }
            100% { opacity: 1; filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); stroke-width: 0; }
        }

        /* 
          PHASE 3: COMING SOON
          Sits behind the zoom, fades in after the lens pushes through the text.
        */
        .coming-soon {
            position: absolute;
            font-style: italic;
            font-size: 3rem;
            letter-spacing: 5px;
            color: #fff;
            opacity: 0;
            z-index: 1;
            transition: opacity 2s ease;
            text-align: center;
        }

        .fade-in {
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="coming-soon" id="coming-soon">Coming Soon</div>

    <div class="zoom-wrapper" id="zoom-container">
        <svg class="svg-canvas" viewBox="0 0 1000 200">
            <!-- Outline layer -->
            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="text-outline">tysonmediagroup.org</text>
            <!-- Fill & Glow layer -->
            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="text-fill" id="glow-text">tysonmediagroup.org</text>
        </svg>
    </div>

    <script>
        // Timing variables
        const TRACE_DURATION = 4500; // 4.5 seconds for the outline
        const GLOW_HOLD = 1500;      // Hold the glow for 1.5 seconds before zooming
        const ZOOM_DURATION = 2500;  // 2.5 seconds to zoom through the 'o'

        window.onload = () => {
            const glowText = document.getElementById('glow-text');
            const zoomContainer = document.getElementById('zoom-container');
            const comingSoon = document.getElementById('coming-soon');

            // 1. Trigger the fill and glow right as the trace finishes
            setTimeout(() => {
                glowText.classList.add('glow-active');
            }, TRACE_DURATION);

            // 2. Trigger the massive scale/zoom into the "o"
            setTimeout(() => {
                zoomContainer.classList.add('zoomed');
            }, TRACE_DURATION + GLOW_HOLD);

            // 3. Fade in "Coming Soon" right as the zoom clears the screen
            setTimeout(() => {
                // Remove the zoom container from flow so it doesn't block the new text
                setTimeout(() => zoomContainer.style.display = 'none', 1000); 
                comingSoon.classList.add('fade-in');
            }, TRACE_DURATION + GLOW_HOLD + (ZOOM_DURATION / 1.5)); // Triggers slightly before zoom finishes for a smooth crossfade
        };
    </script>

</body>
</html>
