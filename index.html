<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | tysonmediagroup.org</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #000; 
            color: #fff;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Cormorant Garamond', serif;
        }

        /* THE LENS / ZOOM WRAPPER 
          transform-origin is zeroed in on the first 'o' in "tyson".
        */
        .zoom-wrapper {
            position: absolute;
            width: 100vw;
            max-width: 1400px;
            display: flex;
            justify-content: center;
            /* Precisely targets the first 'o' */
            transform-origin: 30.5% 53%; 
            will-change: transform;
            /* The zoom takes 1.8s, accelerating smoothly */
            transition: transform 1.8s cubic-bezier(0.8, 0, 0.2, 1);
            z-index: 2;
        }

        /* 1000x scale ensures it punches completely through the letter, clearing the screen */
        .zoomed {
            transform: scale(1000);
        }

        .svg-canvas {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        /* PHASE 1: THE TRACE 
        */
        .text-outline {
            font-size: 110px;
            font-style: italic;
            fill: transparent;
            stroke: rgba(255, 255, 255, 0.8);
            stroke-width: 0.5px;
            /* Perfect math for left-to-right draw */
            stroke-dasharray: 3000;
            stroke-dashoffset: 3000;
            animation: drawTrace 3.5s linear forwards;
        }

        @keyframes drawTrace {
            to { stroke-dashoffset: 0; }
        }

        /* PHASE 2: THE REFLECTIVE SHINE
          Uses the SVG gradient (defined below) to sweep light across the text
        */
        .text-fill {
            font-size: 110px;
            font-style: italic;
            fill: url(#shine-gradient);
            opacity: 0;
            /* The projective volumetric glow */
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)) 
                    drop-shadow(0 0 60px rgba(255,255,255,0.4));
        }

        .glow-active {
            opacity: 1;
            /* Flashes bright, then settles slightly */
            animation: pulseGlow 1s ease-out forwards;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 0px #fff); }
            50% { filter: drop-shadow(0 0 40px #fff) drop-shadow(0 0 100px #fff); }
            100% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)) drop-shadow(0 0 50px rgba(255,255,255,0.3)); }
        }

        /* PHASE 3: COMING SOON 
        */
        .coming-soon {
            position: absolute;
            font-style: italic;
            font-size: clamp(1.5rem, 4vw, 3rem);
            letter-spacing: 4px;
            color: #fff;
            opacity: 0;
            z-index: 1;
            transition: opacity 2s ease;
            text-align: center;
        }

        .fade-in {
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="coming-soon" id="coming-soon">tysonmediagroup.org | Coming later this summer...</div>

    <div class="zoom-wrapper" id="zoom-container">
        <svg class="svg-canvas" viewBox="0 0 1000 200">
            <defs>
                <linearGradient id="shine-gradient" x1="-100%" y1="0%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="rgba(255,255,255,0.7)" />
                    <stop offset="50%" stop-color="#ffffff" />
                    <stop offset="100%" stop-color="rgba(255,255,255,0.7)" />
                    
                    <animate attributeName="x1" from="-100%" to="200%" dur="1.5s" begin="3.5s" fill="freeze" />
                    <animate attributeName="x2" from="0%" to="300%" dur="1.5s" begin="3.5s" fill="freeze" />
                </linearGradient>
            </defs>

            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="text-outline">tysonmediagroup.org</text>
            
            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="text-fill" id="glow-text">tysonmediagroup.org</text>
        </svg>
    </div>

    <script>
        // Tightened Timeline (in milliseconds)
        const TRACE_TIME = 3500; // 3.5s draw
        const GLOW_HOLD = 1000;  // Shine sweeps for 1s
        const ZOOM_TIME = 1800;  // 1.8s violent punch-in

        window.onload = () => {
            const glowText = document.getElementById('glow-text');
            const zoomContainer = document.getElementById('zoom-container');
            const comingSoon = document.getElementById('coming-soon');

            // 1. Trigger Glow & Sweep immediately when Trace finishes
            setTimeout(() => {
                glowText.classList.add('glow-active');
            }, TRACE_TIME);

            // 2. Punch the camera through the 'o'
            setTimeout(() => {
                zoomContainer.classList.add('zoomed');
            }, TRACE_TIME + GLOW_HOLD);

            // 3. Fade in final text once camera clears the threshold
            setTimeout(() => {
                // Kill the SVG so it doesn't lag the browser while hidden
                zoomContainer.style.display = 'none'; 
                comingSoon.classList.add('fade-in');
            }, TRACE_TIME + GLOW_HOLD + ZOOM_TIME);
        };
    </script>

</body>
</html>
