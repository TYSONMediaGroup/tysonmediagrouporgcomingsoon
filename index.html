<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYSON</title>
    <style>
        /* Base Reset and Full Height Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrolling during transition */
            background-color: #000;
            font-family: sans-serif;
            cursor: pointer; /* Feedback that the whole page is clickable */
        }

        /* Splash Screen (Image Overlay) */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 1.5s ease-out, visibility 1.5s ease-out; /* Slow, elegant fade */
        }

        /* The photograph inside the splash screen */
        .splash-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Mirror the video's scaling behavior (2560x1440) */
        }

        /* Splash Screen Fade-out class */
        #splash.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* Video Container (The core experience) */
        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1; /* Sits below the splash screen initially */
            opacity: 0; /* Starts hidden, then fades in *after* the splash fades out */
            transition: opacity 0.8s ease-in;
        }

        /* The Main Video */
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Full height on mobile/desktop, cropping sides if needed */
        }

        /* Subtle Mute/Unmute Button (Top Right) */
        .mute-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mute-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
        }
    </style>
</head>
<body id="page-body">

    <div id="splash">
        <img src="photograph.jpg" alt="Intro Photograph" class="splash-image">
    </div>

    <div id="video-container">
        <video id="bg-video" loop playsinline>
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <button id="mute-btn" class="mute-btn">
            <span id="mute-icon">🔊</span> <span id="mute-text">Mute</span>
        </button>
    </div>

    <script>
        const splash = document.getElementById('splash');
        const video = document.getElementById('bg-video');
        const videoContainer = document.getElementById('video-container');
        const muteBtn = document.getElementById('mute-btn');
        const muteIcon = document.getElementById('mute-icon');
        const muteText = document.getElementById('mute-text');

        // Capture a click ANYWHERE on the body to trigger the experience
        document.body.addEventListener('click', startExperience, { once: true }); // Ensure it only fires once

        function startExperience() {
            // 1. Slow, elegant fade out of the splash image
            splash.classList.add('fade-out');

            // 2. We start the video instantly (since the user interacted, audio is now allowed)
            video.muted = false; // We start it loud as requested
            video.play();

            // 3. Optional subtle fade-in of the video container for extra smoothness
            setTimeout(() => {
                videoContainer.style.opacity = 1;
            }, 750); // Start fading in the video halfway through the splash fade
        }

        // Manual Mute/Unmute toggle (keep it subtle)
        muteBtn.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
                muteIcon.textContent = '🔊';
                muteText.textContent = 'Mute';
            } else {
                video.muted = true;
                muteIcon.textContent = '🔇';
                muteText.textContent = 'Unmute';
            }
        });
    </script>

</body>
</html>
