<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYSON</title>
    <style>
        /* Base Reset and Full Height Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000;
            font-family: sans-serif;
            cursor: pointer; 
        }

        /* Splash Screen (Image Overlay) */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 1.5s ease-out, visibility 1.5s ease-out; 
        }

        .splash-image {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        #splash.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* Video Container */
        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1; 
            opacity: 0; 
            transition: opacity 0.8s ease-in;
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        /* ULTRA-MINIMAL MUTE BUTTON */
        .mute-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: transparent; /* No blocky background color */
            border: none;             /* No borders */
            color: rgba(255, 255, 255, 0.35); /* Super faint, blends into the video */
            font-size: 20px;          /* Clean sizing */
            cursor: pointer;
            transition: color 0.3s ease, transform 0.2s ease;
            z-index: 10;
            padding: 10px;            /* Keeps hit box easy to tap but invisible */
            outline: none;
            user-select: none;
        }

        /* Only lights up slightly on hover so it stays invisible until looked for */
        .mute-btn:hover {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .mute-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body id="page-body">

    <div id="splash">
        <img src="photograph.jpg" alt="Intro Photograph" class="splash-image">
    </div>

    <div id="video-container">
        <video id="bg-video" loop playsinline>
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <button id="mute-btn" class="mute-btn" aria-label="Toggle Sound">
            <span id="mute-icon">🔊</span>
        </button>
    </div>

    <script>
        const splash = document.getElementById('splash');
        const video = document.getElementById('bg-video');
        const videoContainer = document.getElementById('video-container');
        const muteBtn = document.getElementById('mute-btn');
        const muteIcon = document.getElementById('mute-icon');

        // Body tap starts the experience
        document.body.addEventListener('click', startExperience, { once: true }); 

        function startExperience(e) {
            // Prevent the initial full-screen click from instantly toggling the mute button if they clicked near the top right
            if (e.target.closest('#mute-btn')) return;

            splash.classList.add('fade-out');
            video.muted = false; 
            video.play();

            setTimeout(() => {
                videoContainer.style.opacity = 1;
            }, 750); 
        }

        // Isolated toggle button
        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Stops click from triggering the main body logic
            
            if (video.muted) {
                video.muted = false;
                muteIcon.textContent = '🔊';
            } else {
                video.muted = true;
                muteIcon.textContent = '🔇';
            }
        });
    </script>

</body>
</html>
