<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYSON</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* Splash / Enter Screen Overlay */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        /* Elegant Enter Button */
        .enter-btn {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.7);
            color: #fff;
            padding: 15px 40px;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .enter-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        /* Hiding class for splash screen */
        .splash-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* Full screen video container */
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Subtle Mute/Unmute Button in the corner just in case */
        .mute-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .mute-btn:hover {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="splash" class="splash-screen">
        <button id="enter-btn" class="enter-btn">Enter Experience</button>
    </div>

    <div class="video-container">
        <video id="bg-video" loop playsinline>
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <button id="mute-btn" class="mute-btn">
            <span id="mute-icon">🔊</span> <span id="mute-text">Mute</span>
        </button>
    </div>

    <script>
        const splash = document.getElementById('splash');
        const enterBtn = document.getElementById('enter-btn');
        const video = document.getElementById('bg-video');
        const muteBtn = document.getElementById('mute-btn');
        const muteIcon = document.getElementById('mute-icon');
        const muteText = document.getElementById('mute-text');

        // When user clicks Enter
        enterBtn.addEventListener('click', () => {
            // Fade out the splash screen
            splash.classList.add('fade-out');
            
            // Start the video with sound active!
            video.muted = false;
            video.play();
        });

        // Keep the manual mute toggle just in case they want to silence it later
        muteBtn.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
                muteIcon.textContent = '🔊';
                muteText.textContent = 'Mute';
            } else {
                video.muted = true;
                muteIcon.textContent = '🔇';
                muteText.textContent = 'Unmute';
            }
        });
    </script>

</body>
</html>
