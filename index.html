<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tysonmediagroup.org</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        .svg-container { width: 90%; max-width: 1000px; }

        .text-path {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 110px;
            fill: transparent;
            stroke: #fff;
            stroke-width: 0.8px;
            /* Slower trace: Dasharray covers length of text */
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: draw 5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        /* The Powerful to Subtle Glow Transition */
        .text-path.glow {
            animation: draw 5s linear forwards, shine 6s ease-out 5s forwards;
        }

        @keyframes shine {
            0% { 
                fill: #fff; 
                stroke-width: 0px;
                filter: drop-shadow(0 0 80px rgba(255,255,255,0.9)); /* Powerful Reflective Start */
            }
            100% { 
                fill: #fff; 
                filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); /* Suttle End */
            }
        }
    </style>
</head>
<body>

    <div class="svg-container">
        <svg viewBox="0 0 1000 200">
            <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="text-path" id="logo">tysonmediagroup.org</text>
        </svg>
    </div>

    <script>
        const logo = document.getElementById('logo');
        // Trigger the shine animation after the trace finishes
        setTimeout(() => {
            logo.classList.add('glow');
        }, 5000);
    </script>
</body>
</html>
